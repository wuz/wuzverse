name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.list.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          sites=$(ls -d sites/*/ | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "sites=$sites" >> "$GITHUB_OUTPUT"

  deploy:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: ${{ fromJson(needs.discover.outputs.sites) }}
      fail-fast: false
    name: Deploy ${{ matrix.site }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy ${{ matrix.site }}
        run: bun run deploy:${{ matrix.site }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
